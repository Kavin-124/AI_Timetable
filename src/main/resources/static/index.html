<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Timetable Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #f4f7f6; padding-top: 30px; font-family: 'Segoe UI', sans-serif; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: none; border-radius: 10px; margin-bottom: 20px; }
        .header-title { font-weight: bold; color: #2c3e50; }
        .btn-generate { background-color: #27ae60; color: white; font-weight: bold; }
        .btn-generate:hover { background-color: #219653; color: white; }
        .pdf-title { display: none; text-align: center; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2 class="text-center header-title mb-4">🎓 AI Timetable Generator</h2>

    <div class="card p-3 mb-4 text-center">
        <h5 class="text-muted mb-3">Generate Smart Schedule</h5>
        <div class="d-flex justify-content-center gap-3">
            <button class="btn btn-generate btn-lg px-5" onclick="generateTimetable()">🚀 Generate New Timetable Now</button>
            <button class="btn btn-primary btn-lg px-4" onclick="exportToPDF()">📄 Download PDF</button>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card p-4">
                <h4>👨‍🏫 Teachers</h4>
                <hr>
                <div class="d-flex gap-2 mb-3">
                    <input type="text" id="teacherName" class="form-control" placeholder="Teacher Name">
                    <input type="text" id="teacherDept" class="form-control" placeholder="Department">
                    <button class="btn btn-primary px-4" onclick="addTeacher()">Add</button>
                </div>
                <table class="table table-hover mt-3">
                    <thead><tr><th>Name</th><th>Dept</th><th>Action</th></tr></thead>
                    <tbody id="teacherTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4">
                <h4>🎓 Students</h4>
                <hr>
                <div class="d-flex gap-2 mb-3">
                    <input type="text" id="studentName" class="form-control" placeholder="Class Name (e.g. IT A)">
                    <input type="text" id="studentSem" class="form-control" placeholder="Semester">
                    <button class="btn btn-primary px-4" onclick="addStudent()">Add</button>
                </div>
                <table class="table table-hover mt-3">
                    <thead><tr><th>Class</th><th>Semester</th><th>Action</th></tr></thead>
                    <tbody id="studentTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card p-4">
        <h4 class="mb-3">📅 Final Master Timetable</h4>
        <div id="timetableTable" class="bg-white p-3">
            <h2 class="pdf-title" id="pdfTitle">College Master Schedule</h2>
            <table class="table table-bordered table-striped mt-2">
                <thead class="table-light">
                <tr>
                    <th>Day</th>
                    <th>Period</th>
                    <th>Class (Students)</th>
                    <th>Subject</th>
                    <th>Teacher</th>
                </tr>
                </thead>
                <tbody id="timetableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = '/api';

    function loadTeachers() {
        fetch(`${API_URL}/teachers`).then(res => res.json()).then(data => {
            const tbody = document.getElementById('teacherTableBody');
            tbody.innerHTML = '';
            data.forEach(t => {
                if(t.name === 'Study Hall') return;
                tbody.innerHTML += `<tr>
                        <td>${t.name}</td><td>${t.department}</td>
                        <td><button class="btn btn-danger btn-sm" onclick="deleteTeacher(${t.id})">Delete</button></td>
                    </tr>`;
            });
        });
    }

    function addTeacher() {
        const name = document.getElementById('teacherName').value;
        const dept = document.getElementById('teacherDept').value;
        if(!name || !dept) return alert('Please enter both Name and Department!');
        fetch(`${API_URL}/teachers`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name, department: dept})
        }).then(() => {
            document.getElementById('teacherName').value = '';
            document.getElementById('teacherDept').value = '';
            loadTeachers();
        });
    }

    function deleteTeacher(id) {
        fetch(`${API_URL}/teachers/${id}`, { method: 'DELETE' }).then(() => { loadTeachers(); loadTimetable(); });
    }

    function loadStudents() {
        fetch(`${API_URL}/students`).then(res => res.json()).then(data => {
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = '';
            data.forEach(s => {
                tbody.innerHTML += `<tr>
                        <td>${s.name}</td><td>${s.semester}</td>
                        <td><button class="btn btn-danger btn-sm" onclick="deleteStudent(${s.id})">Delete</button></td>
                    </tr>`;
            });
        });
    }

    function addStudent() {
        const name = document.getElementById('studentName').value;
        const sem = document.getElementById('studentSem').value;
        if(!name || !sem) return alert('Please enter both Class Name and Semester!');
        fetch(`${API_URL}/students`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name, semester: sem, department: 'General'})
        }).then(() => {
            document.getElementById('studentName').value = '';
            document.getElementById('studentSem').value = '';
            loadStudents();
        });
    }

    function deleteStudent(id) {
        fetch(`${API_URL}/students/${id}`, { method: 'DELETE' }).then(() => { loadStudents(); loadTimetable(); });
    }

    function generateTimetable() {
        fetch(`${API_URL}/timetable/generate`, { method: 'POST' })
            .then(res => res.json())
            .then(() => loadTimetable())
            .catch(err => alert("Error generating timetable!"));
    }

    function loadTimetable() {
        fetch(`${API_URL}/timetable`).then(res => res.json()).then(data => {
            const tbody = document.getElementById('timetableBody');
            tbody.innerHTML = '';

            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted p-4">No timetable generated yet.</td></tr>';
                return;
            }

            const daysOrder = { "Monday": 1, "Tuesday": 2, "Wednesday": 3, "Thursday": 4, "Friday": 5 };
            data.sort((a, b) => {
                if (daysOrder[a.day] !== daysOrder[b.day]) return daysOrder[a.day] - daysOrder[b.day];
                return a.period.localeCompare(b.period);
            });

            data.forEach(slot => {
                const isStudyHall = slot.teacher.name === "Study Hall";
                const rowClass = isStudyHall ? "table-secondary text-muted" : "";

                tbody.innerHTML += `<tr class="${rowClass}">
                        <td><strong>${slot.day}</strong></td>
                        <td>${slot.period}</td>
                        <td>${slot.student.name} [${slot.student.semester}]</td>
                        <td>${slot.subject}</td>
                        <td>${slot.teacher.name}</td>
                    </tr>`;
            });
        });
    }

    function exportToPDF() {
        const element = document.getElementById('timetableTable');
        document.getElementById('pdfTitle').style.display = 'block';

        const opt = {
            margin: 0.3, filename: 'College_Timetable.pdf',
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            document.getElementById('pdfTitle').style.display = 'none';
        });
    }

    window.onload = () => { loadTeachers(); loadStudents(); loadTimetable(); };
</script>
</body>
</html>
