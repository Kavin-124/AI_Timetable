<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Roster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4 text-primary">🏫 University Teacher Roster</h2>

    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-white">
            <h5 class="mb-0">Add a New Teacher</h5>
        </div>
        <div class="card-body">
            <form id="addTeacherForm" class="row g-3 align-items-center">
                <div class="col-auto">
                    <input type="text" id="nameInput" class="form-control" placeholder="Teacher Name">
                </div>
                <div class="col-auto">
                    <input type="text" id="deptInput" class="form-control" placeholder="Department">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-success">Add Teacher</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Department</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="teacherTableBody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
