<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Timetable Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #f4f7f6; padding-top: 30px; font-family: 'Segoe UI', sans-serif; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: none; border-radius: 10px; margin-bottom: 20px; }
        .header-title { font-weight: bold; color: #2c3e50; }
        .btn-generate { background-color: #27ae60; color: white; font-weight: bold; }
        .row-lecture { background-color: #e8f4fd !important; }
        .row-study { background-color: #f8f9fa !important; color: #6c757d; font-style: italic; }
        .pdf-title { display: none; text-align: center; margin-bottom: 20px; font-weight: bold; }

        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(4px);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .loading-text { margin-top: 15px; font-weight: bold; color: #27ae60; font-size: 1.5rem; letter-spacing: 1px; }
    </style>
</head>
<body>
<div id="loadingOverlay">
    <div class="spinner-border text-success" style="width: 4rem; height: 4rem;" role="status"></div>
    <div class="loading-text">AI is generating schedule... 🧠⚡</div>
</div>

<div class="container">
    <h2 class="text-center header-title mb-4">🎓 AI Timetable Generator</h2>

    <div class="card p-4 mb-4 text-center">
        <h5 class="text-muted mb-3">Schedule Control Center</h5>
        <div class="d-flex justify-content-center gap-3 mb-3">
            <input type="text" id="configNameInput" class="form-control w-25" placeholder="Name it (e.g. Fall 2026)">
            <button class="btn btn-generate px-4" onclick="generateTimetable()">🚀 Generate & Save Schedule</button>
        </div>
        <hr class="w-50 mx-auto">
        <div class="d-flex justify-content-center gap-3 mt-3">
            <select id="configSelect" class="form-select w-25"><option value="">Select a saved schedule...</option></select>
            <button class="btn btn-info px-4 text-white" style="font-weight: bold;" onclick="loadSelectedConfig()">📂 Load</button>
            <button class="btn btn-outline-danger px-4" onclick="deleteSelectedConfig()">🗑️ Delete</button>
            <button class="btn btn-success px-4" onclick="exportToExcel()">📊 Download Excel</button>
            <button class="btn btn-primary px-4" onclick="exportToPDF()">📄 Download PDF</button>
            <button class="btn btn-danger px-4" onclick="logoutUser()">🔒 Log Out</button>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card p-4">
                <h4>👨‍🏫 Teachers</h4>
                <div class="d-flex flex-column gap-2 mb-3">
                    <div class="d-flex gap-2">
                        <input type="text" id="teacherName" class="form-control" placeholder="Name">
                        <input type="text" id="teacherDept" class="form-control" placeholder="Dept">
                    </div>
                    <div class="d-flex gap-2">
                        <input type="text" id="teacherOff" class="form-control" placeholder="Day Off (e.g. Friday)">
                        <button class="btn btn-primary px-4" onclick="addTeacher()">Add</button>
                    </div>
                </div>
                <table class="table table-hover"><tbody id="teacherTableBody"></tbody></table>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-4">
                <h4>🎓 Students</h4>
                <div class="d-flex gap-2 mb-3">
                    <input type="text" id="studentName" class="form-control" placeholder="Class">
                    <input type="text" id="studentSem" class="form-control" placeholder="Sem">
                    <button class="btn btn-primary px-4" onclick="addStudent()">Add</button>
                </div>
                <table class="table table-hover"><tbody id="studentTableBody"></tbody></table>
            </div>
        </div>
    </div>

    <div class="card p-4">
        <h4 class="mb-3">📅 Master Timetable</h4>
        <div id="timetableTable" class="bg-white p-3">
            <h2 class="pdf-title" id="pdfTitle">College Master Schedule</h2>
            <table class="table table-bordered mt-2">
                <thead class="table-light"><tr><th>Day</th><th>Period</th><th>Class</th><th>Subject</th><th>Teacher</th></tr></thead>
                <tbody id="timetableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = '/api';

    function handleError(err, action) {
        console.error("Error during " + action + ":", err);
        alert("System Error during " + action + ". Check Console (F12).");
    }

    function loadTeachers() {
        fetch(`${API_URL}/teachers`).then(res => res.json()).then(data => {
            const tbody = document.getElementById('teacherTableBody'); tbody.innerHTML = '';
            data.forEach(t => {
                if(t.name === 'Study Hall') return;
                const offTag = t.daysOff ? ` <span class="badge bg-secondary ms-1">Off: ${t.daysOff}</span>` : '';
                tbody.innerHTML += `<tr><td>${t.name}${offTag}</td><td>${t.department}</td><td><button class="btn btn-danger btn-sm" onclick="deleteTeacher(${t.id})">Delete</button></td></tr>`;
            });
        }).catch(err => handleError(err, "loading teachers"));
    }

    function addTeacher() {
        const name = document.getElementById('teacherName').value;
        const dept = document.getElementById('teacherDept').value;
        const off = document.getElementById('teacherOff').value;
        if(!name || !dept) return alert('Fill Name and Dept!');

        fetch(`${API_URL}/teachers`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name, department: dept, daysOff: off})
        })
            .then(() => {
                document.getElementById('teacherName').value = '';
                document.getElementById('teacherDept').value = '';
                document.getElementById('teacherOff').value = '';
                loadTeachers();
            }).catch(err => handleError(err, "adding teacher"));
    }

    function deleteTeacher(id) { fetch(`${API_URL}/teachers/${id}`, { method: 'DELETE' }).then(() => loadTeachers()); }

    function loadStudents() {
        fetch(`${API_URL}/students`).then(res => res.json()).then(data => {
            const tbody = document.getElementById('studentTableBody'); tbody.innerHTML = '';
            data.forEach(s => { tbody.innerHTML += `<tr><td>${s.name}</td><td>${s.semester}</td><td><button class="btn btn-danger btn-sm" onclick="deleteStudent(${s.id})">Delete</button></td></tr>`; });
        }).catch(err => handleError(err, "loading students"));
    }

    function addStudent() {
        const name = document.getElementById('studentName').value, sem = document.getElementById('studentSem').value;
        if(!name || !sem) return alert('Fill all fields!');
        fetch(`${API_URL}/students`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: name, semester: sem, department: 'General'}) })
            .then(() => { document.getElementById('studentName').value = ''; document.getElementById('studentSem').value = ''; loadStudents(); }).catch(err => handleError(err, "adding student"));
    }

    function deleteStudent(id) { fetch(`${API_URL}/students/${id}`, { method: 'DELETE' }).then(() => loadStudents()); }

    function loadConfigList() {
        fetch(`${API_URL}/timetable/configs`).then(res => res.json()).then(data => {
            const select = document.getElementById('configSelect'); select.innerHTML = '<option value="">Select a saved schedule...</option>';
            data.forEach(name => { select.innerHTML += `<option value="${name}">${name}</option>`; });
        }).catch(err => handleError(err, "loading config list"));
    }

    function generateTimetable() {
        const configName = document.getElementById('configNameInput').value;
        if (!configName) return alert("Please type a name for this schedule (e.g. Fall 2026) before generating!");
        document.getElementById('loadingOverlay').style.display = 'flex';
        fetch(`${API_URL}/timetable/generate?name=${encodeURIComponent(configName)}`, { method: 'POST' })
            .then(() => { loadConfigList(); loadSpecificTimetable(configName); })
            .catch(err => { handleError(err, "generating timetable"); document.getElementById('loadingOverlay').style.display = 'none'; });
    }

    function loadSelectedConfig() {
        const configName = document.getElementById('configSelect').value;
        if (!configName) return alert("Please select a schedule from the dropdown first!");
        loadSpecificTimetable(configName);
    }

    function deleteSelectedConfig() {
        const configName = document.getElementById('configSelect').value;
        if (!configName) return alert("Please select a schedule from the dropdown to delete!");
        if(confirm(`Are you sure you want to permanently delete the schedule: "${configName}"?`)) {
            fetch(`${API_URL}/timetable/config?name=${encodeURIComponent(configName)}`, { method: 'DELETE' }).then(() => {
                alert("Schedule deleted successfully!"); document.getElementById('timetableBody').innerHTML = '';
                document.getElementById('pdfTitle').innerText = "College Master Schedule"; loadConfigList();
            }).catch(err => handleError(err, "deleting schedule"));
        }
    }

    function loadSpecificTimetable(configName) {
        fetch(`${API_URL}/timetable?name=${encodeURIComponent(configName)}`).then(res => res.json()).then(data => {
            const tbody = document.getElementById('timetableBody'); tbody.innerHTML = '';
            if(data.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted p-4">No data found for this schedule.</td></tr>'; document.getElementById('loadingOverlay').style.display = 'none'; return; }
            const daysOrder = { "Monday": 1, "Tuesday": 2, "Wednesday": 3, "Thursday": 4, "Friday": 5 };
            const periodsOrder = { "09:00 AM - 10:00 AM": 1, "10:00 AM - 11:00 AM": 2, "11:15 AM - 12:15 PM": 3, "12:15 PM - 01:15 PM": 4, "02:00 PM - 03:00 PM": 5, "03:00 PM - 04:00 PM": 6, "04:15 PM - 05:15 PM": 7, "05:15 PM - 06:15 PM": 8 };
            data.sort((a, b) => { if (daysOrder[a.day] !== daysOrder[b.day]) return daysOrder[a.day] - daysOrder[b.day]; return (periodsOrder[a.period] || 99) - (periodsOrder[b.period] || 99); });
            data.forEach(slot => {
                const isStudyHall = slot.subject.includes("Self Study");
                tbody.innerHTML += `<tr class="${isStudyHall ? "row-study" : "row-lecture"}">
                        <td><strong>${slot.day}</strong></td><td>${slot.period}</td><td>${slot.student.name} [${slot.student.semester}]</td><td>${slot.subject}</td><td>${slot.teacher.name}</td>
                    </tr>`;
            });
            document.getElementById('pdfTitle').innerText = "Master Schedule: " + configName;
            document.getElementById('loadingOverlay').style.display = 'none';
        }).catch(err => { handleError(err, "loading timetable"); document.getElementById('loadingOverlay').style.display = 'none'; });
    }

    function exportToExcel() {
        const table = document.getElementById('timetableTable').querySelector('table');
        if (!table) return alert("No table found to export!");
        let csvContent = "";
        table.querySelectorAll('tr').forEach(row => {
            let rowData = [];
            row.querySelectorAll('th, td').forEach(col => { rowData.push(`"${col.innerText.replace(/"/g, '""')}"`); });
            csvContent += rowData.join(",") + "\n";
        });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
        link.download = `${document.getElementById('configSelect').value || "Master"}_Schedule.csv`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    function exportToPDF() {
        const element = document.getElementById('timetableTable'); document.getElementById('pdfTitle').style.display = 'block';
        html2pdf().set({ margin: 0.3, filename: 'College_Timetable.pdf', image: { type: 'jpeg', quality: 1.0 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' } }).from(element).save().then(() => document.getElementById('pdfTitle').style.display = 'none');
    }

    function logoutUser() { fetch('/logout', { method: 'POST' }).then(() => { window.location.href = '/login?logout'; }); }

    window.onload = () => { loadTeachers(); loadStudents(); loadConfigList(); };
</script>
</body>
</html>
